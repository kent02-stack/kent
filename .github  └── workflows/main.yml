name: FleetFlow CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  test-api:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Quality Gate (Pytest)
      run: pytest


  deploy-openshift:
    needs: test-api
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Install OpenShift CLI
      run: |
        curl -L https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz | tar xvz
        chmod +x oc
        sudo mv oc /usr/local/bin/

    - name: Login to OpenShift
      env:
        SERVER: ${{ secrets.OPENSHIFT_SERVER }}
        TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      run: |
        oc login "$SERVER" --token="$TOKEN" --insecure-skip-tls-verify

    - name: Deploy Application
      run: |
        oc new-app python:3.11 --name=fleetflow-cicd --strategy=source || true
        oc start-build fleetflow-cicd --from-dir=. --follow || true